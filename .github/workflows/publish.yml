name: Publish to pub.dev

# Triggers when a version tag is pushed from main (e.g. v0.2.1).
# pub.dev OIDC only accepts push events — workflow_run is not supported.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # Gate: all checks must pass before we attempt to publish.
  # This mirrors ci.yml so a bad commit can never reach pub.dev via a tag.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --exclude-tags golden
      - run: flutter pub publish --dry-run

  # Publish only after test passes — uses OIDC (no stored secrets needed).
  # pub.dev validates: repo = Melsaeed276/Progress-Card-Indicator, tag = v{{version}}
  publish:
    needs: test
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
